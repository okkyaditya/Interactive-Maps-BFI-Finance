<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Kantor BFI Finance Indonesia</title>
    <meta name="description"
        content="Peta interaktif lokasi kantor cabang BFI Finance di seluruh Indonesia. Temukan cabang terdekat dengan unit syariah.">

    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        };
    </script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <!-- App CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Hero Landing Page -->
    <div id="hero-landing" class="hero-landing">
        <div id="hero-landing-root" class="w-full h-full relative"></div>
    </div>

    <!-- Loading Transition Screen -->
    <div id="loading-screen" class="loading-screen" style="display: none;">
        <div class="minimal-loader-container">
            <div class="loader-tip-title">Pro Tip 💡</div>
            <div class="loader-tip-text" id="loading-status">Loading branches data...</div>
            <div class="loading-bar-container">
                <div class="loading-bar-fill" id="loading-bar-fill"></div>
            </div>
        </div>
    </div>

    <!-- Main Interactive Map App Wrapper (Hidden by default) -->
    <div id="app-main" class="app-main" style="display: none;">
        <!-- Header -->
        <header class="header" id="header">
            <div class="header-inner">
                <div class="logo-section">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                            <circle cx="12" cy="10" r="3" />
                        </svg>
                    </div>
                    <div class="logo-text">
                        <h1>BFI Finance</h1>
                        <p class="logo-subtitle">Peta Kantor Cabang</p>
                    </div>
                </div>
                <div class="header-right-side">
                    <div class="header-stats" id="header-stats">
                        <div class="stat-item" id="stat-total">
                            <span class="stat-number">0</span>
                            <span class="stat-label">Total Cabang</span>
                        </div>
                        <div class="stat-divider"></div>
                        <div class="stat-item stat-syariah" id="stat-syariah">
                            <span class="stat-dot green"></span>
                            <span class="stat-number">0</span>
                            <span class="stat-label">Unit Syariah</span>
                        </div>
                        <div class="stat-divider"></div>
                        <div class="stat-item stat-konvensional" id="stat-konvensional">
                            <span class="stat-dot blue"></span>
                            <span class="stat-number">0</span>
                            <span class="stat-label">Konvensional</span>
                        </div>
                    </div>
                    <div class="stat-divider header-stats-divider"></div>
                    <button id="show-table-btn" class="header-action-btn" title="Lihat Semua Cabang">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="8" y1="6" x2="21" y2="6" />
                            <line x1="8" y1="12" x2="21" y2="12" />
                            <line x1="8" y1="18" x2="21" y2="18" />
                            <line x1="3" y1="6" x2="3.01" y2="6" />
                            <line x1="3" y1="12" x2="3.01" y2="12" />
                            <line x1="3" y1="18" x2="3.01" y2="18" />
                        </svg>
                        <span>Lihat Daftar Cabang</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Controls Panel -->
        <div class="controls-panel" id="controls-panel">
            <!-- Search -->
            <div class="search-container" id="search-container">
                <div class="search-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </div>
                <input type="text" id="search-input" class="search-input"
                    placeholder="Cari cabang, kota, atau alamat..." autocomplete="off">
                <button class="search-clear" id="search-clear" aria-label="Hapus pencarian" style="display:none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>

            <!-- Search Results Dropdown -->
            <div class="search-results" id="search-results" style="display:none;"></div>

            <!-- Filter Buttons -->
            <div class="filter-group" id="filter-group">
                <button class="filter-btn active" data-filter="all" id="filter-all">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                    </svg>
                    Semua
                </button>
                <button class="filter-btn" data-filter="syariah" id="filter-syariah">
                    <span class="filter-dot green"></span>
                    Syariah
                </button>
                <button class="filter-btn" data-filter="konvensional" id="filter-konvensional">
                    <span class="filter-dot blue"></span>
                    Konvensional
                </button>
            </div>
        </div>

        <!-- Map Container -->
        <div id="map"></div>

        <!-- Legend -->
        <div class="legend" id="legend">
            <div class="legend-item">
                <div class="legend-marker green"></div>
                <span>Unit Syariah</span>
            </div>
            <div class="legend-item">
                <div class="legend-marker blue"></div>
                <span>Tanpa Syariah</span>
            </div>
        </div>

        <!-- Details Drawer -->
        <div id="details-drawer" class="details-drawer">
            <button class="drawer-close" id="drawer-close" aria-label="Tutup Detail">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
            <div class="drawer-content" id="drawer-content">
                <!-- Konten diisi dinamis via JS -->
            </div>
        </div>
    </div>

    <!-- Interactive Branches Table Modal -->
    <div id="table-modal" class="table-modal" style="display: none;">
        <div class="table-modal-box">
            <div class="table-modal-header">
                <div class="table-modal-title-section">
                    <h2 class="table-modal-title">Daftar Semua Cabang BFI Finance</h2>
                    <p class="table-modal-subtitle">Total terdata: <span id="table-total-count">0</span> cabang</p>
                </div>
                <button id="close-table-btn" class="table-modal-close" aria-label="Tutup Tabel">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>

            <div class="table-modal-filters">
                <div class="table-search-wrapper">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" class="table-search-icon">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" id="table-search-input" class="table-search-input"
                        placeholder="Cari berdasarkan nama, kota, alamat...">
                </div>
                <div class="table-select-wrapper">
                    <select id="table-filter-select" class="table-filter-select">
                        <option value="all">Semua Kategori</option>
                        <option value="syariah">Unit Syariah</option>
                        <option value="konvensional">Konvensional</option>
                    </select>
                </div>
            </div>

            <div class="table-modal-content">
                <table class="branches-data-table">
                    <thead>
                        <tr>
                            <th style="width: 50px;">No</th>
                            <th style="width: 200px;">Nama Cabang</th>
                            <th style="width: 120px;">Jenis</th>
                            <th style="width: 150px;">Kota / Kabupaten</th>
                            <th>Alamat Lengkap</th>
                            <th style="width: 150px;">No. Telepon</th>
                            <th style="width: 120px; text-align: center;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="branches-table-body">
                        <!-- Konten baris dirender dinamis via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <!-- Branch Data -->
    <script src="branches_data.js"></script>

    <!-- React & ReactDOM UMD -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX Compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- React Landing Page Application -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // FadeIn Wrapper Component
        function FadeIn({ delay = 0, duration = 1000, children }) {
            const [visible, setVisible] = useState(false);

            useEffect(() => {
                const timer = setTimeout(() => {
                    setVisible(true);
                }, delay);
                return () => clearTimeout(timer);
            }, [delay]);

            return (
                <div
                    className={`transition-opacity ease-out ${visible ? 'opacity-100' : 'opacity-0'}`}
                    style={{ transitionDuration: `${duration}ms` }}
                >
                    {children}
                </div>
            );
        }

        // AnimatedHeading Component with Character-by-Character Staggered Animation
        function AnimatedHeading({ text, delay = 200, charDelay = 30 }) {
            const [animate, setAnimate] = useState(false);

            useEffect(() => {
                const timer = setTimeout(() => {
                    setAnimate(true);
                }, delay);
                return () => clearTimeout(timer);
            }, [delay]);

            const lines = text.split('\n');

            return (
                <h1
                    className="text-4xl md:text-5xl lg:text-6xl xl:text-7xl font-normal mb-4 text-white leading-tight"
                    style={{ letterSpacing: '-0.04em' }}
                >
                    {lines.map((line, lineIndex) => {
                        const chars = Array.from(line);
                        const lineLength = chars.length;

                        return (
                            <div key={lineIndex} className="block">
                                {chars.map((char, charIndex) => {
                                    const isSpace = char === ' ' || char === '\u00A0';
                                    const displayChar = isSpace ? '\u00A0' : char;

                                    // Delay calculation: (lineIndex * lineLength * charDelay) + (charIndex * charDelay)
                                    const individualDelay = (lineIndex * lineLength * charDelay) + (charIndex * charDelay);

                                    const spanStyle = {
                                        display: 'inline-block',
                                        transition: 'opacity 500ms ease-out, transform 500ms ease-out',
                                        transitionDelay: `${individualDelay}ms`,
                                        opacity: animate ? 1 : 0,
                                        transform: animate ? 'translateX(0)' : 'translateX(-18px)'
                                    };

                                    return (
                                        <span key={charIndex} style={spanStyle}>
                                            {displayChar}
                                        </span>
                                    );
                                })}
                            </div>
                        );
                    })}
                </h1>
            );
        }

        // Main Landing Page Component
        function LandingPage() {
            const handleExplore = () => {
                if (window.startMapTransition) {
                    window.startMapTransition();
                }
            };

            const handleStartChat = () => {
                alert("Opening Blocation Chat Portal...");
            };

            return (
                <div className="w-full h-full relative overflow-hidden bg-black text-white flex flex-col justify-between">
                    {/* Background Video */}
                    <video
                        className="absolute inset-0 w-full h-full object-cover z-0"
                        src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260403_050628_c4e32401-fab4-4a27-b7a8-6e9291cd5959.mp4"
                        autoPlay
                        loop
                        muted
                        playsInline
                    />

                    {/* Navbar */}
                    <header className="relative z-10 px-6 md:px-12 lg:px-16 pt-6">
                        <div className="liquid-glass rounded-xl px-4 py-2 flex items-center justify-between">
                            {/* Left Logo */}
                            <div className="text-2xl font-semibold tracking-tight">Blocation</div>
                        </div>
                    </header>

                    {/* Hero Content (Bottom of viewport) */}
                    <main className="relative z-10 px-6 md:px-12 lg:px-16 flex-1 flex flex-col justify-end pb-6 lg:pb-8">
                        <div className="lg:grid lg:grid-cols-2 lg:items-end w-full">
                            {/* Left Column - Main content */}
                            <div className="flex flex-col items-start max-w-2xl">
                                <AnimatedHeading text={"Lebih Tahu Lokasi,\nMudah Ekspansi"} />

                                <FadeIn delay={800} duration={1000}>
                                    <p className="text-base md:text-lg text-gray-300 mb-5 leading-relaxed font-light">
                                        Tools Interaktif Peta Lokasi Cabang BFI Finance.
                                    </p>
                                </FadeIn>

                                <FadeIn delay={1200} duration={1000}>
                                    <div className="flex flex-wrap gap-4">
                                        <button
                                            onClick={handleExplore}
                                            className="liquid-glass border border-white/20 text-white px-8 py-3 rounded-lg font-medium hover:bg-white hover:text-black transition-all duration-300"
                                        >
                                            Explore Now
                                        </button>
                                    </div>
                                </FadeIn>
                            </div>

                            {/* Right Column - Tag */}
                            <div className="flex items-end justify-start lg:justify-end mt-8 lg:mt-0">
                                <FadeIn delay={1400} duration={1000}>
                                    <div className="liquid-glass border border-white/20 px-6 py-3 rounded-xl">
                                        <span className="text-lg md:text-xl lg:text-2xl font-light tracking-wide">
                                            #SelaluAdaJalan
                                        </span>
                                    </div>
                                </FadeIn>
                            </div>
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="relative z-10 px-6 md:px-12 lg:px-16 pb-6 text-center text-xs text-gray-500 font-light tracking-wide">
                        build with 💖. made by itsokkay
                    </footer>
                </div>
            );
        }

        // Render to Root Container
        const root = ReactDOM.createRoot(document.getElementById('hero-landing-root'));
        root.render(<LandingPage />);
    </script>

    <!-- App JS -->
    <script src="app.js"></script>
</body>

</html>
