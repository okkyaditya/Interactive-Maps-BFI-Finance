<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Kantor BFI Finance Indonesia</title>
    <meta name="description"
        content="Peta interaktif lokasi kantor cabang BFI Finance di seluruh Indonesia. Temukan cabang terdekat dengan unit syariah.">

    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        };
    </script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <!-- App CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Hero Landing Page -->
    <div id="hero-landing" class="hero-landing">
        <div id="hero-landing-root" class="w-full h-full relative"></div>
    </div>

    <!-- Loading Transition Screen -->
    <div id="loading-screen" class="loading-screen" style="display: none;">
        <div class="minimal-loader-container">
            <div class="loader-tip-title">Pro Tip 💡</div>
            <div class="loader-tip-text" id="loading-status">Loading branches data...</div>
            <div class="loading-bar-container">
                <div class="loading-bar-fill" id="loading-bar-fill"></div>
            </div>
        </div>
    </div>

    <!-- Main Interactive Map App Wrapper (Hidden by default) -->
    <div id="app-main" class="app-main" style="display: none;">
        <!-- Header -->
        <header class="header" id="header">
            <div class="header-inner">
                <div class="logo-section">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                            <circle cx="12" cy="10" r="3" />
                        </svg>
                    </div>
                    <div class="logo-text">
                        <h1>BFI Finance</h1>
                        <p class="logo-subtitle">Peta Kantor Cabang</p>
                    </div>
                </div>
                <div class="header-right-side">
                    <div class="header-stats" id="header-stats">
                        <div class="stat-item" id="stat-total">
                            <span class="stat-number">0</span>
                            <span class="stat-label">Total Lokasi</span>
                        </div>
                        <div class="stat-divider"></div>
                        <div class="stat-item stat-syariah" id="stat-syariah">
                            <span class="stat-dot green"></span>
                            <span class="stat-number">0</span>
                            <span class="stat-label">Unit Syariah</span>
                        </div>
                        <div class="stat-divider"></div>
                        <div class="stat-item stat-konvensional" id="stat-konvensional">
                            <span class="stat-dot blue"></span>
                            <span class="stat-number">0</span>
                            <span class="stat-label">Konvensional</span>
                        </div>
                        <div class="stat-divider"></div>
                        <div class="stat-item stat-pos" id="stat-pos">
                            <span class="stat-dot orange"></span>
                            <span class="stat-number">0</span>
                            <span class="stat-label">POS BFI</span>
                        </div>
                    </div>
                    <div class="stat-divider header-stats-divider"></div>
                    <button id="show-table-btn" class="header-action-btn" title="Lihat Data Lengkap">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="8" y1="6" x2="21" y2="6" />
                            <line x1="8" y1="12" x2="21" y2="12" />
                            <line x1="8" y1="18" x2="21" y2="18" />
                            <line x1="3" y1="6" x2="3.01" y2="6" />
                            <line x1="3" y1="12" x2="3.01" y2="12" />
                            <line x1="3" y1="18" x2="3.01" y2="18" />
                        </svg>
                        <span>Data Lengkap</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Controls Panel -->
        <div class="controls-panel" id="controls-panel">
            <!-- Search -->
            <div class="search-container" id="search-container">
                <div class="search-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </div>
                <input type="text" id="search-input" class="search-input"
                    placeholder="Cari cabang, kota, atau alamat..." autocomplete="off">
                <button class="search-clear" id="search-clear" aria-label="Hapus pencarian" style="display:none;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>

            <!-- Search Results Dropdown -->
            <div class="search-results" id="search-results" style="display:none;"></div>

            <!-- Filter Buttons -->
            <div class="filter-group" id="filter-group">
                <button class="filter-btn active" data-filter="all" id="filter-all">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                    </svg>
                    Semua
                </button>
                <button class="filter-btn" data-filter="syariah" id="filter-syariah">
                    <span class="filter-dot green"></span>
                    Syariah
                </button>
                <button class="filter-btn" data-filter="konvensional" id="filter-konvensional">
                    <span class="filter-dot blue"></span>
                    Konvensional
                </button>
                <button class="filter-btn" data-filter="pos" id="filter-pos">
                    <span class="filter-dot orange"></span>
                    POS
                </button>
            </div>
        </div>

        <!-- Map Container -->
        <div id="map"></div>

        <!-- Legend -->
        <div class="legend" id="legend">
            <div class="legend-item">
                <div class="legend-marker green"></div>
                <span>Unit Syariah</span>
            </div>
            <div class="legend-item">
                <div class="legend-marker blue"></div>
                <span>Konvensional</span>
            </div>
            <div class="legend-item">
                <div class="legend-marker orange"></div>
                <span>POS BFI Finance</span>
            </div>
        </div>

        <!-- Details Drawer -->
        <div id="details-drawer" class="details-drawer">
            <button class="drawer-close" id="drawer-close" aria-label="Tutup Detail">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
            <div class="drawer-content" id="drawer-content">
                <!-- Konten diisi dinamis via JS -->
            </div>
        </div>
    </div>

    <!-- Interactive Branches Table Modal -->
    <div id="table-modal" class="table-modal" style="display: none;">
        <div class="table-modal-box">
            <div class="table-modal-header">
                <div class="table-modal-title-section">
                    <h2 class="table-modal-title">Daftar Semua Cabang BFI Finance</h2>
                    <p class="table-modal-subtitle">Total terdata: <span id="table-total-count">0</span> cabang</p>
                </div>
                <button id="close-table-btn" class="table-modal-close" aria-label="Tutup Tabel">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>

            <div class="table-modal-filters">
                <div class="table-search-wrapper">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" class="table-search-icon">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" id="table-search-input" class="table-search-input"
                        placeholder="Cari berdasarkan nama, kota, alamat...">
                </div>
                <div class="table-select-wrapper">
                    <select id="table-filter-select" class="table-filter-select">
                        <option value="all">Semua Kategori</option>
                        <option value="syariah">Unit Syariah</option>
                        <option value="konvensional">Konvensional</option>
                        <option value="pos">POS BFI Finance</option>
                    </select>
                </div>
            </div>

            <div class="table-modal-content">
                <table class="branches-data-table">
                    <thead>
                        <tr>
                            <th class="col-no" style="width: 50px;">No</th>
                            <th class="col-name" style="width: 200px;">Nama Cabang</th>
                            <th class="col-type" style="width: 120px;">Jenis</th>
                            <th class="col-city" style="width: 150px;">Kota / Kabupaten</th>
                            <th class="col-address">Alamat Lengkap</th>
                            <th class="col-phone" style="width: 150px;">No. Telepon</th>
                            <th class="col-action" style="width: 120px; text-align: center;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="branches-table-body">
                        <!-- Konten baris dirender dinamis via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <!-- Branch Data -->
    <script src="branches_data.js"></script>

    <!-- React & ReactDOM UMD -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX Compilation -->
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

    <!-- React Landing Page Application -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // FadeIn Wrapper Component
        function FadeIn({ delay = 0, duration = 1000, children }) {
            const [visible, setVisible] = useState(false);

            useEffect(() => {
                const timer = setTimeout(() => {
                    setVisible(true);
                }, delay);
                return () => clearTimeout(timer);
            }, [delay]);

            return (
                <div
                    className={`transition-opacity ease-out ${visible ? 'opacity-100' : 'opacity-0'}`}
                    style={{ transitionDuration: `${duration}ms` }}
                >
                    {children}
                </div>
            );
        }

        // AnimatedHeading Component with Character-by-Character Staggered Animation
        function AnimatedHeading({ text, delay = 200, charDelay = 30 }) {
            const [animate, setAnimate] = useState(false);

            useEffect(() => {
                const timer = setTimeout(() => {
                    setAnimate(true);
                }, delay);
                return () => clearTimeout(timer);
            }, [delay]);

            const lines = text.split('\n');
            let globalCharIndex = 0;

            return (
                <h1
                    className="text-center text-3xl sm:text-4xl md:text-5xl lg:text-6xl xl:text-7xl font-bold mb-5 text-[#0a0f1d] leading-tight"
                    style={{ letterSpacing: '-0.04em' }}
                >
                    {lines.map((line, lineIndex) => {
                        const words = line.split(' ');

                        return (
                            <div key={lineIndex} className="block">
                                {words.map((word, wordIndex) => {
                                    const chars = Array.from(word);
                                    
                                    return (
                                        <span key={wordIndex} style={{ display: 'inline-block', whiteSpace: 'nowrap' }} className="mx-1">
                                            {chars.map((char, charIndex) => {
                                                const individualDelay = (globalCharIndex++) * charDelay;

                                                const spanStyle = {
                                                    display: 'inline-block',
                                                    transition: 'opacity 500ms ease-out, transform 500ms ease-out',
                                                    transitionDelay: `${individualDelay}ms`,
                                                    opacity: animate ? 1 : 0,
                                                    transform: animate ? 'translateX(0)' : 'translateX(-18px)'
                                                };

                                                return (
                                                    <span key={charIndex} style={spanStyle}>
                                                        {char}
                                                    </span>
                                                );
                                            })}
                                            {wordIndex < words.length - 1 && (
                                                <span style={{ 
                                                    display: 'inline-block',
                                                    transition: 'opacity 500ms ease-out',
                                                    transitionDelay: `${(globalCharIndex++) * charDelay}ms`,
                                                    opacity: animate ? 1 : 0
                                                }}>
                                                    {'\u00A0'}
                                                </span>
                                            )}
                                        </span>
                                    );
                                })}
                            </div>
                        );
                    })}
                </h1>
            );
        }

        // Main Landing Page Component
        function LandingPage() {
            const handleExplore = () => {
                if (window.startMapTransition) {
                    window.startMapTransition();
                }
            };

            const handleShowTable = () => {
                handleExplore();
                setTimeout(() => {
                    const showTableBtn = document.getElementById('show-table-btn');
                    if (showTableBtn) showTableBtn.click();
                }, 1800);
            };

            return (
                <div className="w-full min-h-full relative overflow-y-auto flex flex-col justify-between pt-6 pb-6 bg-white">
                    {/* Top Navbar */}
                    <header className="relative z-10 px-6 md:px-12 lg:px-16">
                        <div className="flex items-center justify-between border-b border-gray-100 pb-4">
                            {/* Left Logo */}
                            <div className="text-2xl font-bold tracking-tight text-[#0f172a] flex items-center gap-2">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2563eb" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                                    <circle cx="12" cy="10" r="3" />
                                </svg>
                                <span>Blocation</span>
                            </div>
                        </div>
                    </header>

                    {/* Centered Main Hero Content */}
                    <main className="relative z-10 px-6 md:px-12 lg:px-16 flex-1 flex flex-col justify-center items-center text-center max-w-4xl mx-auto py-12">
                        {/* Heading */}
                        <div className="w-full text-center mb-2">
                            <AnimatedHeading text={"Lebih Tahu Lokasi,\nMudah Ekspansi"} />
                        </div>

                        {/* Paragraph description */}
                        <FadeIn delay={800} duration={1000}>
                            <p className="text-sm md:text-base text-gray-500 max-w-xl mx-auto mb-10 font-normal leading-relaxed">
                                Tools Interaktif Peta Lokasi Cabang BFI Finance.
                            </p>
                        </FadeIn>

                        {/* Interactive Pill Buttons */}
                        <FadeIn delay={1200} duration={1000}>
                            <div className="flex flex-col sm:flex-row gap-5 justify-center items-center mb-16">
                                {/* Explore Now Pill Button with Blue Arrow Circle */}
                                <button
                                    onClick={handleExplore}
                                    className="bg-[#090d16] text-white pl-7 pr-2.5 py-2.5 rounded-full font-medium flex items-center gap-4 hover:bg-black transition-all duration-200 shadow-md hover:shadow-lg scale-100 hover:scale-[1.02] active:scale-95"
                                >
                                    <span className="tracking-wide">Explore Now</span>
                                    <div className="w-9 h-9 rounded-full bg-[#2563eb] flex items-center justify-center text-white shrink-0">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                            <line x1="5" y1="12" x2="19" y2="12" />
                                            <polyline points="12 5 19 12 12 19" />
                                        </svg>
                                    </div>
                                </button>

                                {/* Lihat Daftar transparent button with blue border */}
                                <button
                                    onClick={handleShowTable}
                                    className="border border-[#93c5fd] text-[#2563eb] px-9 py-3.5 rounded-full font-medium bg-white hover:bg-[#eff6ff] transition-all duration-200 scale-100 hover:scale-[1.02] active:scale-95"
                                >
                                    Data Lengkap
                                </button>
                            </div>
                        </FadeIn>

                        {/* Features Row separated by a vertical line */}
                        <FadeIn delay={1400} duration={1000}>
                            <div className="w-full max-w-3xl mx-auto flex flex-col md:flex-row items-stretch justify-center gap-8 md:gap-0 border-t border-gray-100 pt-10">
                                {/* Feature 1 */}
                                <div className="flex-1 flex gap-4 pr-0 md:pr-8 items-start text-left">
                                    <div className="w-10 h-10 rounded-lg bg-[#eff6ff] flex items-center justify-center text-[#2563eb] shrink-0">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.0" strokeLinecap="round" strokeLinejoin="round">
                                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                                        </svg>
                                    </div>
                                    <div>
                                        <h3 className="font-semibold text-[#0f172a] text-sm md:text-base mb-1">Unit Syariah</h3>
                                        <p className="text-xs md:text-sm text-gray-500 leading-relaxed font-light">
                                            Tersedia unit syariah dengan produk pembiayaan syariah terpercaya di Indonesia.
                                        </p>
                                    </div>
                                </div>

                                {/* Vertical Divider */}
                                <div className="hidden md:block w-[1px] bg-gray-200 self-stretch mx-6"></div>

                                {/* Feature 2 */}
                                <div className="flex-1 flex gap-4 pl-0 md:pl-8 items-start text-left">
                                    <div className="w-10 h-10 rounded-lg bg-[#fffbeb] flex items-center justify-center text-[#d97706] shrink-0">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.0" strokeLinecap="round" strokeLinejoin="round">
                                            <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
                                            <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
                                            <line x1="6" y1="6" x2="6.01" y2="6"/>
                                            <line x1="6" y1="18" x2="6.01" y2="18"/>
                                        </svg>
                                    </div>
                                    <div>
                                        <h3 className="font-semibold text-[#0f172a] text-sm md:text-base mb-1">Kantor Konvensional</h3>
                                        <p className="text-xs md:text-sm text-gray-500 leading-relaxed font-light">
                                            Ratusan jaringan kantor cabang & pos konvensional di seluruh penjuru Nusantara.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </FadeIn>
                    </main>

                    {/* Footer */}
                    <footer className="relative z-10 px-6 md:px-12 lg:px-16 pb-6 text-center text-xs text-gray-400 font-light tracking-wide">
                        build with 💖. made by itsokkay
                    </footer>
                </div>
            );
        }

        // Render to Root Container
        const root = ReactDOM.createRoot(document.getElementById('hero-landing-root'));
        root.render(<LandingPage />);
    </script>

    <!-- App JS -->
    <script src="app.js"></script>
</body>

</html>
